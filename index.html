<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwoDots v8.4.2</title>
</head>
<body style="background:#0b0b12;color:white;font-family:sans-serif;padding:20px">

<h2>TwoDots v8.4.2</h2>

<button id="loginBtn">Login (dummy)</button>
<button id="logoutBtn">Logout</button>

<p id="status">Waiting...</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDncLkeOvMGvmunCZrS9oOknJOJdhtM9Zc",
  authDomain: "twodots-9ab13.firebaseapp.com",
  projectId: "twodots-9ab13",
  storageBucket: "twodots-9ab13.firebasestorage.app",
  messagingSenderId: "1021518468691",
  appId: "1:1021518468691:web:d231210794969f09e818a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");

async function ensureProfile(user){
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      uid:user.uid,
      email:user.email,
      createdAt:serverTimestamp()
    });
    status.textContent = "Profile CREATED ✅";
  }else{
    status.textContent = "Profile EXISTS ✅";
  }
}

onAuthStateChanged(auth, async (user)=>{
  console.log("AUTH:", user);

  if(user){
    status.textContent = "User detected → syncing...";
    try{
      await ensureProfile(user);
    }catch(e){
      status.textContent = "ERROR: "+e.message;
    }
  }else{
    status.textContent = "No user";
  }
});

// dummy login (use existing account)
document.getElementById("loginBtn").onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,"test@test.com","123456");
  }catch(e){
    alert(e.message);
  }
};

document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
};
</script>

</body>
</html>
