<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwoDots v8.4.4 FINAL</title>

<style>
body {margin:0;font-family:system-ui;background:#0b0b12;color:white;}
.screen {display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;}
.active {display:flex;}
input,select {width:80%;padding:12px;margin:8px 0;border-radius:10px;border:none;}
button {padding:12px 20px;border-radius:12px;border:none;margin-top:10px;cursor:pointer;}
h2 {margin-bottom:10px;}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen" class="screen active">
  <h2>TwoDots</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign up</button>
</div>

<!-- PROFILE -->
<div id="profileScreen" class="screen">
  <h2>Complete your profile</h2>

  <select id="nationality"></select>
  <input id="country" placeholder="Country you live">
  <input id="city" placeholder="City">

  <button id="saveProfileBtn">Continue</button>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <h2>TwoDots App</h2>
  <p>You are inside the app ✅</p>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDncLkeOvMGvmunCZrS9oOknJOJdhtM9Zc",
  authDomain: "twodots-9ab13.firebaseapp.com",
  projectId: "twodots-9ab13",
  storageBucket: "twodots-9ab13.firebasestorage.app",
  messagingSenderId: "1021518468691",
  appId: "1:1021518468691:web:d231210794969f09e818a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* UI refs */
const authScreen = document.getElementById("authScreen");
const profileScreen = document.getElementById("profileScreen");
const appScreen = document.getElementById("appScreen");

function show(screen){
  authScreen.classList.remove("active");
  profileScreen.classList.remove("active");
  appScreen.classList.remove("active");
  screen.classList.add("active");
}

/* Countries */
const countries = ["Greece","Philippines","UAE","Italy","Spain","France","Germany","UK","USA","Canada"];
const nat = document.getElementById("nationality");
countries.forEach(c=>{
  const opt = document.createElement("option");
  opt.value = c;
  opt.innerText = c;
  nat.appendChild(opt);
});

/* AUTH LISTENER (CORE FIX) */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    show(authScreen);
    return;
  }

  try{
    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      show(profileScreen);
    } else {
      show(appScreen);
    }
  }catch(e){
    alert("Firestore error: " + e.message);
  }
});

/* AUTH ACTIONS */
document.getElementById("loginBtn").onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
  }catch(e){ alert(e.message); }
};

document.getElementById("signupBtn").onclick = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
  }catch(e){ alert(e.message); }
};

document.getElementById("logoutBtn").onclick = ()=> signOut(auth);

/* SAVE PROFILE */
document.getElementById("saveProfileBtn").onclick = async ()=>{
  const user = auth.currentUser;

  try{
    await setDoc(doc(db,"users",user.uid),{
      uid: user.uid,
      email: user.email,
      nationality: nat.value,
      residenceCountry: document.getElementById("country").value,
      residenceCity: document.getElementById("city").value,
      profileCompleted: true,
      createdAt: serverTimestamp()
    });

    show(appScreen);

  }catch(e){
    alert("Save error: " + e.message);
  }
};
</script>

</body>
</html>
